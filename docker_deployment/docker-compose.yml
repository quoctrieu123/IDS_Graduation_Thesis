networks:
  nids_net:
    driver: bridge

volumes:
  influxdb_data:
  grafana_data:
  spark_checkpoints:

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - nids_net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - nids_net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-adminpassword}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-nids_org}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-nids_bucket}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-nids-super-secret-token-12345}
    networks:
      - nids_net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: grafana-renderer
    environment:
      ENABLE_METRICS: "true"
      AUTH_TOKEN: ${GRAFANA_RENDERER_TOKEN:-nids-renderer-token-2026}
    networks:
      - nids_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      influxdb:
        condition: service_healthy
      renderer:
        condition: service_started
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_RENDERING_SERVER_URL: http://renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      GF_RENDERING_RENDERER_TOKEN: ${GRAFANA_RENDERER_TOKEN:-nids-renderer-token-2026}
      GF_LOG_FILTERS: rendering:debug
    networks:
      - nids_net

  inference-daemon:
    build:
      context: .
      dockerfile: inference.Dockerfile
    image: nids-inference-daemon:dev
    container_name: inference-daemon
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    volumes:
      - ../Use case 3_CIC_IIOT_2025/model_saved:/app/artifacts/model_final:ro
    environment:
      KAFKA_SERVER: ${KAFKA_INTERNAL_SERVER:-kafka:29092}
      PROCESSED_TOPIC: ${PROCESSED_TOPIC:-processed_flows}
      INFERENCE_GROUP_ID: ${INFERENCE_GROUP_ID:-inference_group_docker}
      KAFKA_AUTO_OFFSET_RESET: ${KAFKA_AUTO_OFFSET_RESET:-earliest}
      KAFKA_ENABLE_AUTO_COMMIT: ${KAFKA_ENABLE_AUTO_COMMIT:-true}
      KAFKA_CONNECT_RETRIES: ${KAFKA_CONNECT_RETRIES:-30}
      KAFKA_RETRY_BACKOFF_SECONDS: ${KAFKA_RETRY_BACKOFF_SECONDS:-2.0}
      INFLUXDB_URL: ${INFLUXDB_URL:-http://influxdb:8086}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-nids_org}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-nids_bucket}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-nids-super-secret-token-12345}
      MODEL_DIR: /app/artifacts/model_final
      INFERENCE_DEVICE: ${INFERENCE_DEVICE:-auto}
      CHUNK_SIZE: ${CHUNK_SIZE:-256}
      SEQ_TIME_STEPS: ${SEQ_TIME_STEPS:-10}
      GRAPH_WINDOW_SIZE: ${GRAPH_WINDOW_SIZE:-50}
      GRAPH_MAX_DT: ${GRAPH_MAX_DT:-30.0}
    networks:
      - nids_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python -u daemon.py' >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  spark-streaming:
    build:
      context: .
      dockerfile: spark.Dockerfile
    image: nids-spark-streaming:dev
    container_name: spark-streaming
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ../Use case 3_CIC_IIOT_2025/saved_preprocessed:/app/artifacts/saved_preprocessed:ro
      - spark_checkpoints:/app/checkpoints
    environment:
      KAFKA_SERVER: ${KAFKA_INTERNAL_SERVER:-kafka:29092}
      RAW_TOPIC: ${RAW_TOPIC:-raw_flows}
      PROCESSED_TOPIC: ${PROCESSED_TOPIC:-processed_flows}
      SPARK_STARTING_OFFSETS: ${SPARK_STARTING_OFFSETS:-earliest}
      SPARK_CHECKPOINT: ${SPARK_CHECKPOINT:-file:///app/checkpoints/spark_checkpoints_cciot}
      SAVED_PREPROCESSED_DIR: /app/artifacts/saved_preprocessed
      SPARK_WORKER_LOG: ${SPARK_WORKER_LOG:-/tmp/spark_worker_debug.log}
      SPARK_KAFKA_PACKAGE: ${SPARK_KAFKA_PACKAGE:-org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.1}
    networks:
      - nids_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python -u spark_streaming.py' >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
